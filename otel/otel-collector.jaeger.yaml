# Deno -> :4318 (HTTP). Traces forwarded to Jaeger UI at http://localhost:16686
receivers:
  otlp:
    protocols:
      http:
        endpoint: localhost:4318

processors:
  batch:
  transform/redact:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - replace_pattern(attributes["url.full"], "/bot[^/]+", "/bot***") where IsString(attributes["url.full"])

exporters:
  debug:
    verbosity: basic
  otlp_grpc/jaeger:
    endpoint: 127.0.0.1:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [transform/redact, batch]
      exporters: [debug, otlp_grpc/jaeger]
    metrics:
      receivers: [otlp]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [transform/redact]
      exporters: [debug]
